<!DOCTYPE html>
<html>
<head>
    <title>Cat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .top-left {
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>

    <div class="top-left">
        <a href="/"><button>Home</button></a>
    </div>

    <h1>Your Cat</h1>

    {% if image_url %}
        <img src="{{ image_url }}" width="400" alt="Cat">

        <br><br>

        <a href="{{ url_for('save_cat', image_url=image_url) }}">
            <button>Save Cat</button>
        </a>
    {% else %}
        <p>{{ error or "Error loading cat" }}</p>
    {% endif %}

    <br><br>

    <a href="/cat"><button>Another Cat</button></a>
    <a href="/saved"><button>Saved Cats</button></a>

</body>
</html>
