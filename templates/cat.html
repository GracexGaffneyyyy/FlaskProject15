<!DOCTYPE html>
<html>
<head>
    <title>Cat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* Top-left home button */
        .top-left {
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>

    <!-- Home button (top-left) -->
    <div class="top-left">
        <a href="/"><button>Home</button></a>
    </div>

    <h1>Your Cat</h1>

    {% if image_url %}
        <img src="{{ image_url }}" width="400">
    {% else %}
        <p>Error loading cat</p>
    {% endif %}

    <br><br>

    <a href="/cat"><button>Another Cat</button></a>

    <!-- New Saved Cats button -->
    <a href="/saved"><button>Saved Cats</button></a>

</body>
</html>
