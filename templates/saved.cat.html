<!DOCTYPE html>
<html>
<head>
    <title>Saved Cats</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .top-left {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        .cat-gallery img {
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="top-left">
        <a href="/"><button>Home</button></a>
    </div>

    <h1>🐾 Saved Cats</h1>

    {% if saved_cats %}
        <div class="cat-gallery">
            {% for cat in saved_cats %}
                <div style="margin-bottom: 20px;">
                    <img src="{{ cat.image_url }}" width="250" alt="Saved cat">
                    <p>{{ cat.image_url }}</p>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No cats saved yet.</p>
    {% endif %}

    <br>
    <a href="/cat"><button>See Another Cat</button></a>

</body>
</html>
